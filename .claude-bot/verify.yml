commands:
  - name: install
    cmd: "if command -v bun >/dev/null 2>&1; then bun install --frozen-lockfile 2>/dev/null || bun install; else npm ci 2>/dev/null || npm install; fi"
    timeout: 5m
    level: 1
  - name: lint
    cmd: "bun run lint"
    timeout: 5m
    level: 2
  - name: typecheck
    cmd: "bun run typecheck"
    timeout: 6m
    level: 2
  - name: build
    cmd: "bun run build"
    timeout: 6m
    level: 1
  - name: test
    cmd: "bun run test"
    timeout: 8m
    level: 3
