- id: parallel-fork-join-quality-lift
  claim: "ParallelForkJoinRunner improves final answer quality vs single-pass on HumanEval subset"
  evidence_script: "examples/benchmarks/parallel-fork-quality.mjs"
  last_verified: "2026-06-23"
  ci_mode: "nightly"
  tolerance: "+/- 3% pass@1"
  notes: >
    Uses 3 branches, majority-vote aggregation. Evaluated on 50-item
    HumanEval-Python subset. Single-pass baseline uses same model/temperature.
