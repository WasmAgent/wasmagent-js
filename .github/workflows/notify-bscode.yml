name: Notify bscode of wasmagent-js changes

on:
  push:
    branches: [main]
    paths:
      - "packages/**/package.json"
      - "packages/**/src/**"
  release:
    types: [published]

jobs:
  notify-bscode:
    name: Trigger bscode CI
    runs-on: ubuntu-latest
    steps:
      - name: Check for token
        id: gate
        run: |
          if [ -z "${{ secrets.BSCODE_DISPATCH_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "BSCODE_DISPATCH_TOKEN secret not set; skipping dispatch."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch repository event to bscode
        if: steps.gate.outputs.skip == 'false'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.BSCODE_DISPATCH_TOKEN }}
          repository: WasmAgent/bscode
          event-type: wasmagent-js-updated
          client-payload: |
            {
              "wasmagent_sha": "${{ github.sha }}",
              "wasmagent_ref": "${{ github.ref }}"
            }

  bump-bscode-deps:
    name: Auto-bump bscode @wasmagent dependency versions
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Check for token
        id: gate
        run: |
          if [ -z "${{ secrets.BSCODE_DISPATCH_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "BSCODE_DISPATCH_TOKEN secret not set; skipping bump."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout wasmagent-js (read new versions)
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v7
        with:
          path: wasmagent-js

      - name: Checkout bscode
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v7
        with:
          repository: WasmAgent/bscode
          token: ${{ secrets.BSCODE_DISPATCH_TOKEN }}
          path: bscode

      - name: Set up Node
        if: steps.gate.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Bump @wasmagent/* versions in bscode
        if: steps.gate.outputs.skip == 'false'
        id: bump
        run: |
          set -e
          declare -A VERSIONS
          for pkg_json in wasmagent-js/packages/*/package.json; do
            name=$(jq -r '.name // empty' "$pkg_json")
            version=$(jq -r '.version // empty' "$pkg_json")
            private=$(jq -r '.private // false' "$pkg_json")
            if [ -n "$name" ] && [ -n "$version" ] && [ "$private" = "false" ]; then
              VERSIONS["$name"]="$version"
            fi
          done

          changed=false
          for target in bscode/apps/worker/package.json bscode/apps/web/package.json; do
            for name in "${!VERSIONS[@]}"; do
              version="${VERSIONS[$name]}"
              if jq -e --arg n "$name" '(.dependencies // {}) | has($n)' "$target" > /dev/null 2>&1; then
                jq --arg n "$name" --arg v "^$version" '.dependencies[$n] = $v' "$target" > "$target.tmp" && mv "$target.tmp" "$target"
                changed=true
              fi
            done
          done

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Open PR in bscode
        if: steps.gate.outputs.skip == 'false' && steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.BSCODE_DISPATCH_TOKEN }}
          path: bscode
          commit-message: "chore: bump @wasmagent/* to ${{ github.ref_name }}"
          branch: "chore/wasmagent-bump-${{ github.ref_name }}"
          title: "chore: bump @wasmagent/* to ${{ github.ref_name }}"
          body: |
            Automated bump triggered by wasmagent-js release `${{ github.ref_name }}`.
            wasmagent-js commit: ${{ github.sha }}
          labels: dependencies,automated
