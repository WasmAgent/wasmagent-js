name: Notify bscode of wasmagent-js changes

# When wasmagent-js main branch updates, dispatch a repository_dispatch
# event to bscode so it can run its CI against the latest wasmagent-js
# published packages from npm.

on:
  push:
    branches: [main]
    paths:
      - "packages/**/package.json"
      - "packages/**/src/**"

jobs:
  notify-bscode:
    name: Trigger bscode CI
    runs-on: ubuntu-latest
    # Only run if a PAT secret has been configured in repo settings.
    # Without BSCODE_DISPATCH_TOKEN, this job becomes a no-op.
    steps:
      - name: Check for token
        id: gate
        run: |
          if [ -z "${{ secrets.BSCODE_DISPATCH_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "BSCODE_DISPATCH_TOKEN secret not set; skipping dispatch."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch repository event to bscode
        if: steps.gate.outputs.skip == 'false'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.BSCODE_DISPATCH_TOKEN }}
          repository: WasmAgent/bscode
          event-type: wasmagent-js-updated
          client-payload: |
            {
              "wasmagent_sha": "${{ github.sha }}",
              "wasmagent_ref": "${{ github.ref }}"
            }

  bump-bscode-deps:
    name: Auto-bump bscode dependency versions (placeholder)
    runs-on: ubuntu-latest
    # Activates when a tag push or release event publishes new versions to npm.
    # Steps: read new version from packages/*/package.json → checkout bscode
    # → run bump script → open PR.
    if: false
    steps:
      - run: echo "Placeholder — activate on release tag push"
