name: Publish Alpha Packages

# Manual workflow to publish alpha packages that are excluded from the
# main Release (changeset) workflow.
# Run this once when you are ready to first-publish @wasmagent/aep
# or @wasmagent/mcp-gateway to npm.

on:
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated list of package dirs to publish (e.g. aep mcp-gateway)"
        required: true
        default: "aep mcp-gateway"
      dry_run:
        description: "Dry run (print what would be published without actually publishing)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  publish-alpha:
    if: github.repository == 'WasmAgent/wasmagent-js'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Set npm registry
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish specified packages
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          for pkg_name in ${{ github.event.inputs.packages }}; do
            pkg_dir="packages/$pkg_name"
            pkg_json="$pkg_dir/package.json"
            if [ ! -f "$pkg_json" ]; then
              echo "✗ $pkg_dir/package.json not found — skipping"
              continue
            fi
            name=$(node -e "const p=require('./$pkg_json');process.stdout.write(p.name)")
            version=$(node -e "const p=require('./$pkg_json');process.stdout.write(p.version)")
            echo "Package: $name@$version"

            if npm view "${name}@${version}" version 2>/dev/null | grep -q "$version"; then
              echo "✓ Already on npm — skipping"
              continue
            fi

            if [ "$DRY_RUN" = "true" ]; then
              echo "→ DRY RUN: would publish $name@$version"
              (cd "$pkg_dir" && npm publish --access public --dry-run)
            else
              echo "→ Publishing $name@$version"
              (cd "$pkg_dir" && npm publish --access public)
              echo "✓ Published $name@$version"
            fi
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
