name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # A1 — Enforce that heavy optional deps are NEVER statically imported in core.
      # Any top-level "import ... from '@anthropic-ai/sdk'" (or the other three) in
      # packages/core/src must be "import type" only; actual value imports must use
      # await import() inside function bodies. A single grep failure here means a
      # consumer installing core would pull the SDK in unconditionally.
      - name: Guard core against static heavy imports (A1)
        run: |
          HEAVY_DEPS="@anthropic-ai/sdk|openai|pyodide|@modelcontextprotocol/sdk"
          # Match lines that are top-level value imports (not "import type")
          VIOLATIONS=$(grep -rn --include="*.ts" \
            -P "^import\s+(?!type\s)" \
            packages/core/src/ \
            | grep -P "$HEAVY_DEPS" \
            | grep -v "\.test\.ts" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: packages/core/src contains static value imports of heavy deps."
            echo "Use 'await import()' inside function bodies or 'import type' instead."
            echo ""
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: no static heavy imports found in packages/core/src"

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Run tests for all packages except kernel-pyodide (handled separately below
      # to avoid turbo caching WASM results across pyodide version bumps).
      - name: Test (excluding kernel-pyodide)
        run: pnpm turbo run test --filter=!@agentkit-js/kernel-pyodide

      # kernel-pyodide runs outside turbo so its results are never cached.
      # pyodide WASM content changes are invisible to turbo's TS-hash-based cache key;
      # running directly ensures a pyodide upgrade always re-executes the tests.
      - name: Test kernel-pyodide (no cache)
        run: pnpm --filter @agentkit-js/kernel-pyodide test

  deploy-worker:
    name: Deploy Cloudflare Worker (main only)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # A2 — Bundle size budget: keep the worker lean.
      # Baseline is 500 KB (measured with externals: node:vm, pyodide, @anthropic-ai/sdk).
      # Increase the limit in .size-limit.json only with a conscious PR review.
      - name: Check bundle size budget (A2)
        run: pnpm --filter @agentkit-js/cloudflare-worker size
        continue-on-error: true  # Non-blocking until baseline is calibrated in CI

      - name: Deploy to Cloudflare Workers
        run: pnpm --filter @agentkit-js/cloudflare-worker deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
