name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from packageManager field in package.json.
      # Do NOT specify "version:" here — it conflicts with the packageManager field
      # and causes ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # A1 — Enforce that heavy optional deps are NEVER statically imported in core.
      # Any top-level "import ... from '@anthropic-ai/sdk'" (or the other three) in
      # packages/core/src must be "import type" only; actual value imports must use
      # await import() inside function bodies. A single grep failure here means a
      # consumer installing core would pull the SDK in unconditionally.
      - name: Guard core against static heavy imports (A1)
        run: |
          HEAVY_DEPS="@anthropic-ai/sdk|openai|pyodide|@modelcontextprotocol/sdk"
          # Match lines that are top-level value imports (not "import type")
          VIOLATIONS=$(grep -rn --include="*.ts" \
            -P "^import\s+(?!type\s)" \
            packages/core/src/ \
            | grep -P "$HEAVY_DEPS" \
            | grep -v "\.test\.ts" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: packages/core/src contains static value imports of heavy deps."
            echo "Use 'await import()' inside function bodies or 'import type' instead."
            echo ""
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: no static heavy imports found in packages/core/src"

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Run tests for all packages except kernel-pyodide (handled separately below).
      # Two-layer pyodide cache prevention (both layers needed):
      #   Layer 1 — this --filter exclusion: stops kernel-pyodide reaching turbo entirely
      #     in CI, where cold-cache turbo would otherwise record a cache entry keyed on
      #     TS source hashes (which don't capture WASM content changes).
      #   Layer 2 — turbo.json "@agentkit-js/kernel-pyodide#test": { "cache": false }:
      #     guards the local `pnpm test` (turbo run test, no --filter) path so developers
      #     running the full suite locally never get stale cached WASM test results either.
      #   Both layers are intentional and non-redundant.
      - name: Test (excluding kernel-pyodide)
        run: pnpm turbo run test --filter=!@agentkit-js/kernel-pyodide

      # kernel-pyodide runs via pnpm --filter (direct vitest, bypasses turbo entirely).
      # pyodide WASM content is opaque to turbo's input-hash — a new pyodide version
      # with a different WASM bundle would produce identical TS hashes and hit a stale
      # cache. Running directly guarantees the real WASM is loaded on every CI run.
      - name: Test kernel-pyodide (no cache)
        run: pnpm --filter @agentkit-js/kernel-pyodide test

  deploy-worker:
    name: Deploy Cloudflare Worker (main only)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # A2 — Bundle size budget: keep the worker lean.
      # Baseline is 500 KB (measured with externals: node:vm, pyodide, @anthropic-ai/sdk).
      # Increase the limit in .size-limit.json only with a conscious PR review.
      - name: Check bundle size budget (A2)
        run: pnpm --filter @agentkit-js/cloudflare-worker size
        continue-on-error: true  # Non-blocking until baseline is calibrated in CI

      - name: Deploy to Cloudflare Workers
        # Skip gracefully when secrets are not configured (forks, draft PRs).
        if: secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != ''
        run: pnpm --filter @agentkit-js/cloudflare-worker exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
