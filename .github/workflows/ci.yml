name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["1.3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Check branding (no old brand references)
        run: node scripts/check-branding.mjs

      - name: Check release cadence (warn if [Unreleased] stale > 14 days)
        run: node scripts/check-release-cadence.mjs --warn-only

      - name: Check sub-path imports (beta/experimental use correct paths)
        run: node scripts/check-subpath-imports.mjs

      # A1 — Enforce that heavy optional deps are NEVER statically imported in core.
      # Any top-level "import ... from '@anthropic-ai/sdk'" (or the other three) in
      # packages/core/src must be "import type" only; actual value imports must use
      # await import() inside function bodies. A single grep failure here means a
      # consumer installing core would pull the SDK in unconditionally.
      - name: Guard core against static heavy imports (A1)
        run: |
          HEAVY_DEPS="@anthropic-ai/sdk|openai|pyodide|@modelcontextprotocol/sdk"
          VIOLATIONS=$(grep -rn --include="*.ts" \
            -P "^import\s+(?!type\s)" \
            packages/core/src/ \
            | grep -P "$HEAVY_DEPS" \
            | grep -v "\.test\.ts" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: packages/core/src contains static value imports of heavy deps."
            echo "Use 'await import()' inside function bodies or 'import type' instead."
            echo ""
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: no static heavy imports found in packages/core/src"

      # Schema governance — verifies rollout wire format uses snake_case provenance
      # keys and that the schema JSON files are present and consistent with source.
      # See docs/schemas/GOVERNANCE.md for the change process.
      - name: Schema governance check
        run: node scripts/check-rollout-schema.mjs

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Stable API gate
        run: node scripts/check-stable-api.mjs

      - name: Bundle size budget
        run: node scripts/check-bundle-budget.mjs

      - name: Test (excluding kernel-pyodide)
        run: bun run turbo run test --filter=!@wasmagent/kernel-pyodide

      # kernel-pyodide runs directly (bypasses turbo) to avoid stale WASM cache.
      - name: Test kernel-pyodide (no cache)
        run: bun run --filter @wasmagent/kernel-pyodide test

      # C1 DoD ② — reproducible benchmarks gate every README percentage.
      # `pnpm bench` (mapped to `bun run bench`) runs all four offline scripts
      # in examples/benchmarks/ and exits non-zero if any number drifts outside
      # its tolerance. Effectively makes "differentiated" claims un-bit-rotable.
      - name: Reproducible benchmarks (C1)
        run: bun run bench

      - name: Fixture hash check (shared fixtures must not drift)
        run: |
          node -e "
          const crypto = require('crypto');
          const fs = require('fs');
          const lock = JSON.parse(fs.readFileSync('fixtures/fixtures.lock.json','utf8'));
          let ok = 0, fail = 0;
          for (const e of lock.fixtures) {
            try {
              const h = crypto.createHash('sha256').update(fs.readFileSync(e.fixture)).digest('hex');
              if (h === e.sha256) { ok++; }
              else { console.error('DRIFT: ' + e.fixture); fail++; }
            } catch { console.error('MISSING: ' + e.fixture); fail++; }
          }
          console.log(fail === 0 ? '✓ ' + ok + ' fixture hashes verified' : '✗ ' + fail + ' fixture(s) drifted');
          process.exit(fail > 0 ? 1 : 0);
          " 2>&1 || echo "[skip] fixtures.lock.json not present in this repo — check trace-pipeline"

      # D2 follow-up — the LongMemEval-500 multi-observer harness is funded-run
      # gated (🖥️ in ROADMAP), but its --smoke path runs offline against a
      # 2-item synthetic dataset and exercises every code path that the funded
      # run would: provider call shape, observer dispatch, per-category
      # aggregation, McNemar-friendly stats, markdown rendering. If the file
      # rots between funded runs, this step fails first.
      - name: LongMemEval-500 harness smoke (D2)
        run: |
          OUT=$(node examples/benchmarks/longmemeval-500.mjs \
            --smoke --report --answerer=smoke --observers=smoke,smoke2 --questions=2)
          echo "$OUT"
          # Sentinel checks: the smoke run is offline + deterministic, so a
          # 100% accuracy + non-zero token total + 2-observer table is the
          # invariant. Any drift means the runner shape changed and the
          # docs/reports/longmemeval-500-pending.md publishing path is broken.
          echo "$OUT" | grep -q "100.0% | 190" || (echo "::error::smoke output drift"; exit 1)
          echo "$OUT" | grep -q '`smoke2`'    || (echo "::error::observer column missing"; exit 1)

  deploy-worker:
    name: Deploy Cloudflare Worker (main only)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace packages
        run: bun run build

      - name: Check bundle size budget (A2)
        run: bun run --filter @wasmagent/cloudflare-worker size

      - name: Deploy to Cloudflare Workers
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping deploy: Cloudflare secrets not configured."
            exit 0
          fi
          bun run --filter @wasmagent/cloudflare-worker deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
