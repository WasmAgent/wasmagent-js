name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Typecheck & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bun-version: ["latest"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      # A1 — Enforce that heavy optional deps are NEVER statically imported in core.
      # Any top-level "import ... from '@anthropic-ai/sdk'" (or the other three) in
      # packages/core/src must be "import type" only; actual value imports must use
      # await import() inside function bodies. A single grep failure here means a
      # consumer installing core would pull the SDK in unconditionally.
      - name: Guard core against static heavy imports (A1)
        run: |
          HEAVY_DEPS="@anthropic-ai/sdk|openai|pyodide|@modelcontextprotocol/sdk"
          VIOLATIONS=$(grep -rn --include="*.ts" \
            -P "^import\s+(?!type\s)" \
            packages/core/src/ \
            | grep -P "$HEAVY_DEPS" \
            | grep -v "\.test\.ts" \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: packages/core/src contains static value imports of heavy deps."
            echo "Use 'await import()' inside function bodies or 'import type' instead."
            echo ""
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: no static heavy imports found in packages/core/src"

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test (excluding kernel-pyodide)
        run: bun run turbo run test --filter=!@agentkit-js/kernel-pyodide

      # kernel-pyodide runs directly (bypasses turbo) to avoid stale WASM cache.
      - name: Test kernel-pyodide (no cache)
        run: bun run --filter @agentkit-js/kernel-pyodide test

  deploy-worker:
    name: Deploy Cloudflare Worker (main only)
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace packages
        run: bun run build

      - name: Check bundle size budget (A2)
        run: bun run --filter @agentkit-js/cloudflare-worker size

      - name: Deploy to Cloudflare Workers
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Skipping deploy: Cloudflare secrets not configured."
            exit 0
          fi
          bun run --filter @agentkit-js/cloudflare-worker deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
