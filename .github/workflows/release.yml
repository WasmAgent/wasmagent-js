name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
      - "packages/**"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'WasmAgent/wasmagent-js'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Set npm registry
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Pre-publish new packages (first-time npm registration)
        run: |
          # Publish any package that has never been on npm before.
          # changeset publish fails with E404 on brand-new scoped packages;
          # a direct `npm publish` on those packages first creates the registry entry.
          for pkg_dir in packages/*/; do
            pkg_json="$pkg_dir/package.json"
            [ -f "$pkg_json" ] || continue
            private=$(node -e "const p=require('./$pkg_json');process.stdout.write(String(p.private||false))")
            [ "$private" = "true" ] && continue
            name=$(node -e "const p=require('./$pkg_json');process.stdout.write(p.name)")
            version=$(node -e "const p=require('./$pkg_json');process.stdout.write(p.version)")
            # Check if this version already exists on npm
            if npm view "${name}@${version}" version 2>/dev/null | grep -q "$version"; then
              echo "✓ $name@$version already on npm — skipping"
            else
              echo "→ First publish: $name@$version"
              (cd "$pkg_dir" && npm publish --access public) || echo "⚠ $name@$version publish failed (may be expected for alpha packages)"
            fi
          done
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run release:version
          publish: bun run release:publish
          commit: "chore: release"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Publish-readiness check (only when packages were published)
        if: steps.changesets.outputs.published == 'true'
        run: bun run publish:check

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse published packages from changesets output
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'
          # Get the core version (representative of the release)
          CORE_VERSION=$(echo "$PACKAGES" | python3 -c "
          import sys, json
          pkgs = json.load(sys.stdin)
          core = next((p for p in pkgs if p['name'] == '@wasmagent/core'), pkgs[0] if pkgs else None)
          print(core['version'] if core else 'unknown')
          ")
          TAG="v${CORE_VERSION}"
          # Extract [Unreleased] section from CHANGELOG for release notes
          NOTES=$(python3 -c "
          import re
          content = open('CHANGELOG.md').read()
          # Find the first versioned section (just published)
          m = re.search(r'^## \[' + re.escape('${CORE_VERSION}') + r'\](.*?)(?=^## \[|\Z)', content, re.M | re.S)
          if m:
              print(m.group(1).strip()[:10000])
          else:
              print('See CHANGELOG.md for details.')
          ")
          gh release create "$TAG" \
            --title "wasmagent $TAG" \
            --notes "$NOTES" \
            --latest
