name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".changeset/**"
      - "packages/**"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'WasmAgent/wasmagent-js'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # Node 24 provides an npm new enough (>= 11.5.1) for OIDC trusted
      # publishing, which `changeset publish` invokes under the hood. We keep
      # NPM_TOKEN auth for now (works until npm's 2FA-token deprecation); this
      # only makes the runner OIDC-ready so the eventual token->OIDC switch is a
      # config change, not a toolchain upgrade. Requires per-package trusted
      # publishers configured on npmjs.com before dropping NPM_TOKEN.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Set npm registry
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run release:version
          publish: bun run release:publish
          commit: "chore: release"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Publish-readiness check (only when packages were published)
        # Continue even if individual packages fail metadata checks — they
        # were already accepted by npm. The check here is informational, not
        # blocking, so we don't lose the GitHub Release creation that follows.
        if: steps.changesets.outputs.published == 'true'
        continue-on-error: true
        run: bun run publish:check


      - name: Deprecate legacy model-* shims
        if: steps.changesets.outputs.published == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Deprecate the 8 model-* shim packages that now re-export from
          # @wasmagent/models. Only deprecates versions that exist on npm;
          # skips with a warning if the package/version was never published.
          SHIMS="
            @wasmagent/model-anthropic
            @wasmagent/model-openai
            @wasmagent/model-deepseek
            @wasmagent/model-doubao
            @wasmagent/model-minimax
            @wasmagent/model-moonshot
            @wasmagent/model-qwen
            @wasmagent/model-zhipu
          "
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          for pkg in $SHIMS; do
            msg="Deprecated: use @wasmagent/models instead. See https://github.com/WasmAgent/wasmagent-js/issues/123"
            if npm deprecate "$pkg" "$msg" 2>&1; then
              echo "✓ deprecated $pkg"
            else
              echo "⚠ could not deprecate $pkg (may not be published yet — will retry on next release)"
            fi
          done
      - name: Create GitHub Release (aggregate)
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse published packages from changesets output
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'
          # Get the core version (representative of the release)
          CORE_VERSION=$(echo "$PACKAGES" | python3 -c "
          import sys, json
          pkgs = json.load(sys.stdin)
          core = next((p for p in pkgs if p['name'] == '@wasmagent/core'), pkgs[0] if pkgs else None)
          print(core['version'] if core else 'unknown')
          ")
          TAG="v${CORE_VERSION}"
          # Idempotency guard: when core-four packages publish in batches
          # (e.g. core+mcp-firewall first, aep+compliance to align after),
          # the second Release run targets the same aggregate tag. Skip if
          # the release already exists rather than failing with HTTP 422.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping aggregate create."
            exit 0
          fi
          # Extract [Unreleased] section from CHANGELOG for release notes
          NOTES=$(python3 -c "
          import re
          content = open('CHANGELOG.md').read()
          # Find the first versioned section (just published)
          m = re.search(r'^## \[' + re.escape('${CORE_VERSION}') + r'\](.*?)(?=^## \[|\Z)', content, re.M | re.S)
          if m:
              print(m.group(1).strip()[:10000])
          else:
              print('See CHANGELOG.md for details.')
          ")
          gh release create "$TAG" \
            --title "wasmagent $TAG" \
            --notes "$NOTES" \
            --latest
